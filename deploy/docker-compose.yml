# Production stack — fully isolated (own project name + network, no host ports published).
# Public access is provided by the cloudflared tunnel only. Run from this `deploy/` directory:
#   docker compose up -d --build
#   docker compose run --rm backend python database/seed_data.py
name: recourse

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: recourse
    volumes:
      - recourse_pgdata:/var/lib/postgresql/data
      - ../backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recourse"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ../backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  agents:
    build: ../backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: python -m agents.run_agents

  frontend:
    build: ../frontend
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    # Exposed on localhost only so the host's OpenLiteSpeed (CyberPanel) reverse-proxies the
    # public domain to it. Not published to 0.0.0.0 — no direct external access.
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - frontend
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://caddy:8080
    depends_on:
      - caddy

volumes:
  recourse_pgdata:
