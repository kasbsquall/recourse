<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Theft Scene Photos · CLM-2024-03988</title>
<style>
  body { font-family: Georgia, serif; color: #14110e; background: #f4efe6; margin: 0; padding: 40px 16px; }
  .doc { max-width: 820px; margin: 0 auto; background: #fff; border: 1px solid #cbc4b5; padding: 40px 44px; box-shadow: 0 8px 40px rgba(0,0,0,.12); }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { font-size: 12px; color: #5b554a; margin-bottom: 22px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  figure { margin: 0; border: 1px solid #ddd; }
  figure img { width: 100%; height: 230px; object-fit: cover; display: block; background: #eee; }
  .ph { width: 100%; height: 230px; display: flex; align-items: center; justify-content: center; background: #efeadf; color: #8a8170; font-size: 12px; text-align: center; padding: 12px; }
  figcaption { font-size: 12px; color: #5b554a; padding: 8px 10px; }
</style>
</head>
<body>
<div class="doc">
  <h1>Photographic Evidence — CLM-2024-03988</h1>
  <div class="sub">3 photos on file · larceny from vehicle · personal-use vehicle · Miami, FL</div>
  <div class="grid" id="grid"></div>
</div>
<script>
  const shots = [
    ["theft-1.jpg", "Dashboard — stereo head unit removed, harness exposed"],
    ["theft-2.jpg", "Exhaust — catalytic converter cut out (fresh saw marks)"],
    ["theft-3.jpg", "Vehicle at residence — ordinary personal car, no rideshare livery or signage"],
  ];
  document.getElementById("grid").innerHTML = shots.map(([src, cap]) =>
    `<figure><img src="${src}" alt="${cap}" onerror="this.outerHTML='<div class=\\'ph\\'>Photo ${src} — add to /public/docs/</div>'"><figcaption>${cap}</figcaption></figure>`
  ).join("");
</script>
</body>
</html>
